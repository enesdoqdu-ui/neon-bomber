<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, landscape">
    <title>NEON BOMBER: ULTRA VISIBILITY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        :root {
            --bg: #000; --panel: #050505; --text: #0ff; --wall: #1a1a1a; --border: #333;
        }

        /* Day Mode Colors */
        .day-mode {
            --bg: #e0e0e0; --panel: #f5f5f5; --text: #000; --wall: #000; --border: #999;
        }

        body {
            background-color: var(--bg); color: var(--text); font-family: 'Orbitron', sans-serif;
            margin: 0; overflow: hidden; touch-action: none; height: 100vh;
            display: flex; flex-direction: column; transition: background 0.3s;
        }

        #top-panel {
            height: 55px; width: 100%; background: var(--panel);
            border-bottom: 3px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        #game-container { flex-grow: 1; position: relative; overflow: hidden; background: var(--bg); }

        .mode-btn {
            background: var(--text); color: var(--bg); border: none;
            padding: 5px 10px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            border-radius: 4px; font-size: 0.7rem;
        }

        #bottom-panel {
            height: 80px; width: 100%; background: var(--panel);
            border-top: 3px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box; z-index: 100;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg); opacity: 0.95; z-index: 300;
        }

        .btn {
            margin: 10px; padding: 12px 30px; border: 3px solid var(--text);
            background: transparent; color: var(--text); font-family: 'Orbitron'; font-weight: bold;
        }

        #damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.3); display: none; pointer-events: none; z-index: 150;
        }

        .hud-label { font-size: 0.6rem; color: var(--text); opacity: 0.7; }
        .hud-value { font-size: 0.9rem; font-weight: 700; color: var(--text); }
        
        #swipe-dot {
            position: absolute; width: 15px; height: 15px; background: var(--text);
            border-radius: 50%; display: none; pointer-events: none; z-index: 200; box-shadow: 0 0 10px var(--text);
        }
    </style>
</head>
<body>

    <div id="top-panel">
        <div style="text-align:center"><div class="hud-label">LVL</div><div class="hud-value" id="lvl">01</div></div>
        <div style="text-align:center"><div class="hud-label">SCORE</div><div class="hud-value" id="score-val">0000</div></div>
        <button class="mode-btn" id="mode-toggle" onclick="toggleDisplayMode()">DAY MODE</button>
        <div style="text-align:center"><div class="hud-label">LIFE</div><div class="hud-value" id="hp-display">❤️❤️❤️</div></div>
    </div>

    <div id="game-container">
        <div id="damage-flash"></div>
        <div id="swipe-dot"></div>
        
        <div id="start-screen" class="screen">
            <h1 style="font-size: 2.5rem; margin-bottom: 5px;">PROTOCOL</h1>
            <p style="font-size: 0.8rem; margin-bottom: 20px;">SWIPE LEFT: MOVE | TAP RIGHT: BOMB</p>
            <button class="btn" onclick="initGame()">BOOT SYSTEM</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bottom-panel">
        <div><div class="hud-label">RADAR</div><canvas id="miniMapCanvas" width="100" height="50"></canvas></div>
        <div style="text-align:right">
            <div class="hud-label">THREATS</div>
            <div class="hud-value" id="enemy-count" style="color: #f00;">0</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const miniCanvas = document.getElementById('miniMapCanvas');
    const mctx = miniCanvas.getContext('2d');
    const swipeDot = document.getElementById('swipe-dot');

    const GRID = 40;
    const MAP_COLS = 35, MAP_ROWS = 18; 
    const ZOOM = 1.8; 

    let viewW, viewH, state = 'START', isDayMode = false;
    let level = 1, lives = 3, score = 0, shake = 0;
    let map = [], bombs = [], enemies = [], fx = [];

    const player = { x: 0, y: 0, vx: 0, vy: 0, speed: 2.4 };
    const camera = { x: 0, y: 0 };

    function toggleDisplayMode() {
        isDayMode = !isDayMode;
        document.body.classList.toggle('day-mode');
        document.getElementById('mode-toggle').innerText = isDayMode ? 'NIGHT MODE' : 'DAY MODE';
    }

    function resize() {
        const container = document.getElementById('game-container');
        viewW = container.clientWidth; viewH = container.clientHeight;
        canvas.width = viewW; canvas.height = viewH;
    }
    window.addEventListener('resize', resize);
    resize();

    function initLevelData() {
        map = []; bombs = []; enemies = []; fx = [];
        for (let r = 0; r < MAP_ROWS; r++) {
            map[r] = [];
            for (let c = 0; c < MAP_COLS; c++) {
                if (r === 0 || r === MAP_ROWS-1 || c === 0 || c === MAP_COLS-1 || (r%2 === 0 && c%2 === 0)) map[r][c] = 1;
                else if (Math.random() < 0.22) map[r][c] = 2;
                else map[r][c] = 0;
            }
        }
        player.x = GRID * 1.5; player.y = GRID * 1.5;
        const count = Math.min(level + 2, 10);
        for(let i=0; i < count; i++) {
            enemies.push({
                x: (MAP_COLS - 2) * GRID - 20,
                y: (MAP_ROWS - 2) * GRID - 20,
                vx: (1.3 + (level * 0.1)) * (Math.random() > 0.5 ? 1 : -1),
                vy: (1.3 + (level * 0.1)) * (Math.random() > 0.5 ? -1 : 1)
            });
        }
        updateUI();
    }

    function isWall(nx, ny) {
        const off = 14; 
        const pts = [{x:nx-off,y:ny-off}, {x:nx+off,y:ny-off}, {x:nx-off,y:ny+off}, {x:nx+off,y:ny+off}];
        for(let p of pts) {
            let c = Math.floor(p.x/GRID), r = Math.floor(p.y/GRID);
            if(map[r] && map[r][c] !== 0) return true;
        }
        return false;
    }

    function triggerExplosion(bomb, index) {
        bombs.splice(index, 1); shake = 12;
        const dirs = [[0,0],[0,1],[0,-1],[1,0],[-1,0]];
        dirs.forEach(d => {
            for(let i=0; i <= 1; i++) {
                let nr = bomb.r + d[0]*i, nc = bomb.c + d[1]*i;
                if(map[nr] && map[nr][nc] === 1) break;
                fx.push({c: nc, r: nr, life: 1.0});
                if(map[nr] && map[nr][nc] === 2) { map[nr][nc] = 0; score += 2; break; }
                enemies = enemies.filter(e => {
                    let hit = Math.floor(e.y/GRID) === nr && Math.floor(e.x/GRID) === nc;
                    if(hit) score += 10; return !hit;
                });
                if(Math.floor(player.y/GRID) === nr && Math.floor(player.x/GRID) === nc) takeDamage();
            }
        });
        updateUI();
    }

    function update() {
        if(state !== 'PLAYING') return;
        let nx = player.x + player.vx, ny = player.y + player.vy;
        if (!isWall(nx, ny)) { player.x = nx; player.y = ny; }

        let tx = player.x - (viewW / 2) / ZOOM, ty = player.y - (viewH / 2) / ZOOM;
        camera.x += (tx - camera.x) * 0.1; camera.y += (ty - camera.y) * 0.1;
        camera.x = Math.max(0, Math.min(camera.x, MAP_COLS*GRID - viewW/ZOOM));
        camera.y = Math.max(0, Math.min(camera.y, MAP_ROWS*GRID - viewH/ZOOM));

        if(shake > 0) { camera.x += (Math.random()-0.5)*shake; camera.y += (Math.random()-0.5)*shake; shake *= 0.8; }
        if(bombs.length > 0 && (bombs[0].t -= 16) <= 0) triggerExplosion(bombs[0], 0);

        enemies.forEach(e => {
            if(!isWall(e.x + e.vx, e.y)) e.x += e.vx; else e.vx *= -1;
            if(!isWall(e.x, e.y + e.vy)) e.y += e.vy; else e.vy *= -1;
            if(Math.hypot(player.x-e.x, player.y-e.y) < 22) takeDamage();
        });

        fx = fx.filter(f => (f.life -= 0.06) > 0);
        if(enemies.length === 0) { level++; initLevelData(); }
    }

    function draw() {
        ctx.clearRect(0, 0, viewW, viewH);
        ctx.save();
        ctx.scale(ZOOM, ZOOM);
        ctx.translate(-camera.x, -camera.y);

        // Map
        for(let r=0; r<MAP_ROWS; r++) {
            for(let c=0; c<MAP_COLS; c++) {
                if(map[r][c] === 1) { 
                    ctx.fillStyle = isDayMode ? '#000' : '#1a1a1a';
                    ctx.fillRect(c*GRID+4, r*GRID+4, 32, 32);
                } else if(map[r][c] === 2) {
                    ctx.strokeStyle = isDayMode ? '#f0f' : '#ff00ff';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(c*GRID+8, r*GRID+8, 24, 24);
                }
            }
        }

        bombs.forEach(b => {
            ctx.fillStyle = b.t < 500 ? '#f00' : '#ff0';
            ctx.beginPath(); ctx.arc(b.c*GRID+20, b.r*GRID+20, 15, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        });

        fx.forEach(f => {
            ctx.fillStyle = isDayMode ? `rgba(0,0,0,${f.life})` : `rgba(255,255,255,${f.life})`;
            ctx.fillRect(f.c*GRID, f.r*GRID, GRID, GRID);
        });
        
        enemies.forEach(e => {
            ctx.fillStyle = '#f00'; ctx.fillRect(e.x-12, e.y-12, 24, 24);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(e.x-12, e.y-12, 24, 24);
        });

        // Player (More visible)
        ctx.fillStyle = isDayMode ? '#0077ff' : '#0ff';
        ctx.fillRect(player.x-14, player.y-14, 28, 28);
        ctx.strokeStyle = isDayMode ? '#000' : '#fff';
        ctx.lineWidth = 3;
        ctx.strokeRect(player.x-14, player.y-14, 28, 28);
        
        ctx.restore();
        drawMiniMap(); update(); requestAnimationFrame(draw);
    }

    function drawMiniMap() {
        mctx.fillStyle = isDayMode ? '#fff' : '#000'; mctx.fillRect(0,0,100,50);
        const sx = 100/(MAP_COLS*GRID), sy = 50/(MAP_ROWS*GRID);
        mctx.fillStyle = isDayMode ? '#ccc' : '#222';
        for(let r=0; r<MAP_ROWS; r++) for(let c=0; c<MAP_COLS; c++) if(map[r][c]!==0) mctx.fillRect(c*GRID*sx, r*GRID*sy, 3, 3);
        mctx.fillStyle = '#f00'; enemies.forEach(e => mctx.fillRect(e.x*sx, e.y*sy, 4, 4));
        mctx.fillStyle = '#0ff'; mctx.fillRect(player.x*sx, player.y*sy, 5, 5);
    }

    function takeDamage() {
        lives--; updateUI(); shake = 25;
        document.getElementById('damage-flash').style.display = 'block';
        setTimeout(() => document.getElementById('damage-flash').style.display = 'none', 100);
        if(lives <= 0) location.reload();
        else { player.x = GRID*1.5; player.y = GRID*1.5; player.vx = 0; player.vy = 0; }
    }

    function updateUI() {
        document.getElementById('lvl').innerText = (level < 10 ? "0"+level : level);
        document.getElementById('score-val').innerText = score.toString().padStart(4, '0');
        document.getElementById('hp-display').innerText = "❤️".repeat(lives);
        document.getElementById('enemy-count').innerText = enemies.length;
    }

    function initGame() { document.getElementById('start-screen').style.display='none'; state='PLAYING'; initLevelData(); draw(); }

    // --- ENHANCED SWIPE CONTROLS ---
    let startX = 0, startY = 0;
    const gContainer = document.getElementById('game-container');

    gContainer.addEventListener('touchstart', e => {
        const touch = e.touches[0];
        const rect = gContainer.getBoundingClientRect();
        const relX = touch.clientX - rect.left;

        if(relX < viewW / 2) {
            startX = touch.clientX; startY = touch.clientY;
            swipeDot.style.display = 'block';
            swipeDot.style.left = relX - 7 + 'px';
            swipeDot.style.top = (touch.clientY - rect.top) - 7 + 'px';
        } else {
            if(state === 'PLAYING' && bombs.length === 0) {
                bombs.push({r: Math.floor(player.y/GRID), c: Math.floor(player.x/GRID), t: 1500});
            }
        }
    });

    gContainer.addEventListener('touchmove', e => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = gContainer.getBoundingClientRect();
        if(touch.clientX < rect.left + viewW / 2) {
            const dx = touch.clientX - startX, dy = touch.clientY - startY;
            const dist = Math.hypot(dx, dy);
            if(dist > 5) {
                const angle = Math.atan2(dy, dx);
                const moveDist = Math.min(1, dist / 40);
                player.vx = Math.cos(angle) * player.speed * moveDist;
                player.vy = Math.sin(angle) * player.speed * moveDist;
            }
        }
    }, {passive: false});

    gContainer.addEventListener('touchend', () => {
        player.vx = 0; player.vy = 0; swipeDot.style.display = 'none';
    });

</script>
</body>
</html>

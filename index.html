<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON BOMBER</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

:root { --bg:#000; --panel:#050505; --text:#0ff; --border:#333; }
.day-mode { --bg:#e0e0e0; --panel:#f5f5f5; --text:#000; --border:#999; }

body {
    margin:0;
    height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:Orbitron,sans-serif;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    touch-action:none;
}

#top-panel,#bottom-panel{
    background:var(--panel);
    border:3px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-around;
}

#top-panel{height:55px;border-top:none;}
#bottom-panel{height:80px;border-bottom:none;}

#game-container{flex:1;position:relative;}
canvas{display:block;}

.screen{
    position:absolute;inset:0;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
}

.btn{
    padding:15px 40px;
    background:none;
    color:var(--text);
    border:3px solid var(--text);
    font-family:Orbitron;
}

.mode-btn{
    background:var(--text);
    color:var(--bg);
    padding:6px 12px;
    border:none;
    border-radius:6px;
}

.hud-label{font-size:.6rem;opacity:.6}
.hud-value{font-size:1rem;font-weight:700}

#damage-flash{
    position:absolute;inset:0;
    background:rgba(255,0,0,.4);
    display:none;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="top-panel">
    <div><div class="hud-label">LEVEL</div><div class="hud-value" id="lvl">01</div></div>
    <div><div class="hud-label">SCORE</div><div class="hud-value" id="score-val">0000</div></div>
    <button class="mode-btn" onclick="toggleDisplayMode()">MODE</button>
    <div><div class="hud-label">ENERGY</div><div class="hud-value" id="hp-display">❤️❤️❤️</div></div>
</div>

<div id="game-container">
    <div id="damage-flash"></div>
    <div id="start-screen" class="screen">
        <h2>PROTOCOL X</h2>
        <p>1sn BAS → BOMBA<br>KAYDIR → HAREKET</p>
        <button class="btn" onclick="initGame()">START</button>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="bottom-panel">
    <canvas id="miniMapCanvas" width="90" height="45"></canvas>
    <div>
        <div class="hud-label">HOSTILES</div>
        <div class="hud-value" id="enemy-count" style="color:#f00">0</div>
    </div>
</div>

<script>
/* ========== AUDIO ========== */
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function playSound(t){
    if(audioCtx.state==='suspended')audioCtx.resume();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';
    o.frequency.value=t==='boom'?80:400;
    g.gain.value=.3;
    o.start();o.stop(audioCtx.currentTime+.25);
}

/* ========== GAME ========== */
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const mini=document.getElementById('miniMapCanvas');
const mctx=mini.getContext('2d');

const GRID=40, MAP_COLS=32, MAP_ROWS=18, ZOOM=1.8;
let viewW,viewH,state='START';

let level=1,lives=3,score=0;
let map=[],bombs=[],enemies=[];

const player={x:60,y:60,vx:0,vy:0,speed:2.5};
const camera={x:0,y:0};

function resize(){
    viewW=canvas.width=document.getElementById('game-container').clientWidth;
    viewH=canvas.height=document.getElementById('game-container').clientHeight;
}
window.addEventListener('resize',resize);resize();

function toggleDisplayMode(){document.body.classList.toggle('day-mode');}

function initLevel(){
    map=[];bombs=[];enemies=[];
    for(let r=0;r<MAP_ROWS;r++){
        map[r]=[];
        for(let c=0;c<MAP_COLS;c++){
            map[r][c]=(r==0||c==0||r==MAP_ROWS-1||c==MAP_COLS-1||(r%2==0&&c%2==0))?1:(Math.random()<.25?2:0);
        }
    }
    player.x=60;player.y=60;
    for(let i=0;i<5+level;i++){
        enemies.push({x:GRID*(MAP_COLS-2),y:GRID*(MAP_ROWS-2),vx:1.5,vy:1.5});
    }
    updateUI();
}

function isWall(x,y){
    const o=14;
    const pts=[[x-o,y-o],[x+o,y-o],[x-o,y+o],[x+o,y+o]];
    for(const p of pts){
        let c=Math.floor(p[0]/GRID),r=Math.floor(p[1]/GRID);
        if(map[r]&&map[r][c]!==0)return true;
    }
    return false;
}

function explode(b){
    playSound('boom');
    [[0,0],[1,0],[-1,0],[0,1],[0,-1]].forEach(d=>{
        for(let i=0;i<2;i++){
            let r=b.r+d[1]*i,c=b.c+d[0]*i;
            if(map[r]&&map[r][c]==1)break;
            if(map[r]&&map[r][c]==2){map[r][c]=0;score+=2;}
        }
    });
    updateUI();
}

function update(){
    let nx=player.x+player.vx,ny=player.y+player.vy;
    if(!isWall(nx,ny)){player.x=nx;player.y=ny;}

    player.vx*=0.85;player.vy*=0.85;
    if(Math.abs(player.vx)<.05)player.vx=0;
    if(Math.abs(player.vy)<.05)player.vy=0;

    camera.x=player.x-viewW/(2*ZOOM);
    camera.y=player.y-viewH/(2*ZOOM);

    if(bombs.length&&((bombs[0].t-=16)<=0))explode(bombs.shift());
}

function draw(){
    ctx.clearRect(0,0,viewW,viewH);
    ctx.save();
    ctx.scale(ZOOM,ZOOM);
    ctx.translate(-camera.x,-camera.y);

    for(let r=0;r<MAP_ROWS;r++)for(let c=0;c<MAP_COLS;c++){
        if(map[r][c]==1){ctx.fillStyle='#222';ctx.fillRect(c*GRID,r*GRID,GRID,GRID);}
        if(map[r][c]==2){ctx.strokeStyle='#f0f';ctx.strokeRect(c*GRID+8,r*GRID+8,24,24);}
    }

    bombs.forEach(b=>{
        ctx.fillStyle='#ff0';
        ctx.beginPath();
        ctx.arc(b.c*GRID+20,b.r*GRID+20,14,0,Math.PI*2);
        ctx.fill();
    });

    enemies.forEach(e=>{
        ctx.fillStyle='#f00';
        ctx.fillRect(e.x-12,e.y-12,24,24);
    });

    ctx.fillStyle='#0ff';
    ctx.fillRect(player.x-14,player.y-14,28,28);

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

function updateUI(){
    document.getElementById('lvl').textContent=String(level).padStart(2,'0');
    document.getElementById('score-val').textContent=String(score).padStart(4,'0');
    document.getElementById('hp-display').textContent='❤️'.repeat(lives);
    document.getElementById('enemy-count').textContent=enemies.length;
}

function initGame(){
    state='PLAYING';
    document.getElementById('start-screen').style.display='none';
    initLevel();
    draw();
}

/* ========== TOUCH ========== */
let sx=0,sy=0,holding=false,holdTimer=null;
const HOLD=1000,SWIPE=20;

const gc=document.getElementById('game-container');

gc.addEventListener('touchstart',e=>{
    if(state!=='PLAYING')return;
    const t=e.touches[0];
    sx=t.clientX;sy=t.clientY;holding=true;
    holdTimer=setTimeout(()=>{
        if(holding&&bombs.length===0){
            bombs.push({r:Math.floor(player.y/GRID),c:Math.floor(player.x/GRID),t:1500});
            playSound('bomb_drop'); navigator.vibrate?.(40);
        }
    },HOLD);
},{passive:true});

gc.addEventListener('touchmove',e=>{
    if(!holding)return;
    const t=e.touches[0];
    const dx=t.clientX-sx,dy=t.clientY-sy;
    if(Math.hypot(dx,dy)<SWIPE)return;

    clearTimeout(holdTimer);holding=false;

    if(Math.abs(dx)>Math.abs(dy)){
        player.vx=dx>0?player.speed:-player.speed;player.vy=0;
    }else{
        player.vy=dy>0?player.speed:-player.speed;player.vx=0;
    }
},{passive:true});

gc.addEventListener('touchend',()=>{
    clearTimeout(holdTimer);
    holding=false;
    player.vx=0;player.vy=0;
});
</script>

</body>
</html>
